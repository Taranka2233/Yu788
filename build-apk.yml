name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install npm dependencies
        run: npm install

      - name: Prepare web assets
        run: |
          mkdir -p www
          if [ -f index-1.html ]; then cp index-1.html www/index.html;
          elif [ -f index.html ]; then cp index.html www/index.html; fi
          mkdir -p resources
          if [ -f icon.png ]; then cp icon.png resources/icon.png; fi
          if [ -f splash.png ]; then cp splash.png resources/splash.png; fi

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then npx cap add android; fi

      - name: Configure dynamic app icons
        run: |
          if [ -f setup_icons.py ]; then python3 setup_icons.py; else echo "setup_icons.py нет — пропускаю"; fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
